
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>ezWeb Testing</title>
		<link rel="stylesheet" type="text/css" href="./css/normalize.css">		

		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
		<div id="app"></div>

		<script type="module">
			"use strict";
			
			import ezWeb from "https://cdn.jsdelivr.net/gh/Akadine/ezWebJS@v0.1.8/ezWeb.js";
			
			/***************************************************************
			 * Static switch:
			 * - true  => build UI "query style" (wrapper) using $
			 * - false => build UI "ezWeb style" (raw DOM ops, no wrapper)
			 *
			 * Change, save, reload to test both build modes.
			 ***************************************************************/
			const options = {
				appPrefix: "DemoHtml",
				logTimestamps: false,
				verbosity: 3, // DEBUG
				dom: {
					debug: false
				},
				net: {
					debug: false,
					ajaxSettings: {
						// defaults live here; leave empty for now
						// timeout: 5000,
						// headers: { "X-App": "ezWeb" }
					}
				},
				bind: {
					debug: false
				}
			};

			const data = {};

			ezWeb("app", "bind", data, options, function (system) {
				const log = system.log;
				const base = system.base;
				const data = system.data;
				const $ = system.dom;
				const net = system.net;
				const bind = system.bind;

				const app = $(system.appEl);
				
				app.append("<div>Added HTML String</div>");
				app.append("div",{text:"Added via spec obj"});
				app.append({tag:"div",text:"Added via spec obj, tag included in spec"});

				log.info("About to call ajax");

				net.ajax({
					url: "https://httpbin.org/anything",
					responseType: "json"
				})
				.done(function (res) {
					log.info("AJAX SUCCESS:", res);
				})
				.fail(function (err) {
					log.error("AJAX FAIL:", err);
				});

				log.info("ajax() call returned");
				
				//test ezClick
				data.inc = 0;
				
				app.append("input", {type: "text", ezBind: "inc"});
				app.append("button", {type:"button", ezClick:"incFn;", text:"Increment"});
				
				data.incFn = function(system) {
					const data = system.data;
					data.inc++;
				}
				
				data.tech = "Star Wars Tech Selected";
				data.color = "red";
				
				// test back tick binding
				app.append("div", { style: "color:``color``;", ezBind: "tech" }); // <--this works fine
								
				//test dropdown binding
				// helper: first enabled option (so separators never become default)
				data._firstEnabledValue = function (opts) {
					if (!Array.isArray(opts)) return "";
					for (let i = 0; i < opts.length; i++) {
						const entry = opts[i];
						if (Array.isArray(entry) && entry[1] === true) return String(entry[0]);
					}
					return "";
				};
				
				// 1) define the two dropdown models (static templates)
				data.swTechOptions = [
					["blaster", true],
					["----------", false],
					["lightsaber", true],
					["----------", false],
					["xwing", true]
				];

				data.stTechOptions = [
					["phaser", true],
					["----------", false],
					["batleth", true],
					["----------", false],
					["shuttlepod", true]
				];

				// 2) active bound dropdown object
				data.techDrop = { options: [], selectedValue: "" };

				// Franchise + technology-specific ezFor models.
				data.peopleByTech = {
					sw: {
						blaster: [
							{ name: "Han Solo", role: "Smuggler" },
							{ name: "Leia Organa", role: "General" }
						],
						lightsaber: [
							{ name: "Luke Skywalker", role: "Jedi" },
							{ name: "Darth Vader", role: "Sith Lord" }
						],
						deathstar: [
							{ name: "Grand Moff Tarkin", role: "Commander" },
							{ name: "Orson Krennic", role: "Director" }
						]
					},
					st: {
						phaser: [
							{ name: "James T. Kirk", role: "Captain" },
							{ name: "William Riker", role: "Commander" }
						],
						batleth: [
							{ name: "Worf", role: "Klingon Warrior" },
							{ name: "Martok", role: "General" }
						],
						shuttlepod: [
							{ name: "Trip Tucker", role: "Chief Engineer" },
							{ name: "Tom Paris", role: "Pilot" }
						],
						teleporter: [
							{ name: "Montgomery Scott", role: "Chief Engineer" },
							{ name: "Miles O'Brien", role: "Transporter Chief" }
						]
					}
				};

				data.franchise = "sw";
				data.people = [];

				data.setTechPeople = function(system, context) {
					const data = system.data;
					const selected = context && context.target
						? context.target.value
						: data.techDrop.selectedValue;

					data.techDrop.selectedValue = selected;
					data.people = (data.peopleByTech[data.franchise] || {})[selected] || [];
				};

				// Radios change the franchise and repopulate the technology dropdown.
				data.setFranchise = function(system, context) {
					const data = system.data;
					const which = context && context.target
						? context.target.value
						: data.franchise;
					const opts = (which === "st") ? data.stTechOptions : data.swTechOptions;
					const tech = (which === "st") ? "Trek" : "Wars";

					data.franchise = which;
					data.color = (which === "st") ? "blue" : "red";
					data.techDrop.options = opts;
					data.techDrop.selectedValue = data._firstEnabledValue(opts);
					data.tech = "Star " + tech + " Tech Selected";

					if (which === "st" && data.techDrop.options[5] === undefined) {
						data.techDrop.options.push(["----------", false]);
						data.techDrop.options.push(["teleporter", true]);
					}

					if (which === "sw") {
						data.techDrop.options[4] = ["deathstar", true];
					}

					// The radio changes the dropdown model, then the dropdown's
					// selected value chooses the one shared ezFor collection.
					data.setTechPeople(system);
				};

				// Initialize the active franchise and dropdown before rendering.
				data.setFranchise(system);

				// Franchise radios repopulate the dropdown.
				app.append("label", {
					children: [
						{ tag: "input", type: "radio", name: "franchise", value: "sw", checked: true, ezChange: "setFranchise" },
						{ tag: "span", text: "Star Wars" }
					]
				});
				app.append("label", {
					children: [
						{ tag: "input", type: "radio", name: "franchise", value: "st", ezChange: "setFranchise" },
						{ tag: "span", text: "Star Trek" }
					]
				});

				// The dropdown selection changes the data rendered by the one ezFor.
				app.append("select", {
					ezBind: "techDrop",
					ezChange: "setTechPeople"
				});

				app.append("div", { text: "Selected: " });
				app.append("div", { ezBind: "techDrop.selectedValue" });

				// Exactly one ezFor; its collection changes with dropdown selection.
				app.append("div", {
					ezFor: "people",
					style: "padding:6px;border:1px solid #444;margin:4px;display:none;",
					children: [
						{ tag: "div", text: "Name:" },
						{ tag: "div", ezBind: "name" },
						{ tag: "div", text: "Role:" },
						{ tag: "div", ezBind: "role" }
					]
				});
				
				
			}).then(function (pid) {
				// pid is the library process id for this element mount.
				// For security, this is the only thing ezWeb returns.
			});
		</script>
	</body>
</html>
